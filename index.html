<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment System Pesona Kahuripan 9</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        @media print {
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body class="bg-gray-100 p-4">

<div class="max-w-5xl mx-auto bg-white rounded-lg shadow-lg p-6">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-indigo-700">
            Payment System Pesona Kahuripan 9
        </h1>

        <div class="space-x-2">
            <button onclick="setup2FA()"
                class="bg-yellow-500 text-white px-4 py-2 rounded">
                🛡️ Setup 2FA
            </button>

            <button onclick="handleLogout()"
                class="bg-red-600 text-white px-4 py-2 rounded">
                Logout
            </button>
        </div>
    </div>

    <div class="bg-indigo-50 p-4 rounded border">
        <p class="font-semibold">Google Authenticator MFA Ready</p>
        <p class="text-sm text-gray-600">
            File final hasil merge Appwrite 2FA v16.0.0
        </p>
    </div>

</div>

<!-- MODAL 2FA -->
<div id="setup2faModal"
class="fixed inset-0 bg-black bg-opacity-75 hidden flex justify-center items-center z-[100] no-print">

    <div class="bg-white p-6 rounded-lg w-full max-w-sm text-center shadow-xl">

        <h3 class="text-xl font-bold mb-2 text-indigo-800">
            Scan QR Code
        </h3>

        <p class="text-sm text-gray-600 mb-4">
            Scan using Google Authenticator
        </p>

        <div id="qr-container"
            class="flex justify-center p-4 bg-gray-50 border rounded-lg mb-4 mx-auto w-[230px] h-[230px]">
        </div>

        <input
            type="text"
            id="setup-2fa-code"
            class="w-full p-3 border rounded text-center text-xl tracking-[0.5em] font-bold mb-4"
            placeholder="000000"
            maxlength="6">

        <div class="flex justify-between gap-2">

            <button
                onclick="close2FAModal()"
                class="w-1/2 px-4 py-2 bg-gray-200 rounded font-bold">
                Cancel
            </button>

            <button
                onclick="confirmSetup2FA()"
                class="w-1/2 px-4 py-2 bg-green-600 text-white rounded font-bold">
                Confirm 2FA
            </button>

        </div>

    </div>
</div>

<script type="module">

import {
    Client,
    Account
} from 'https://cdn.jsdelivr.net/npm/appwrite@16.0.0/+esm';

const client = new Client()
    .setEndpoint('https://sgp.cloud.appwrite.io/v1')
    .setProject('6a13b3dc00064ce155ef');

const account = new Account(client);

let currentLang = 'id';

// =====================================================
// SETUP 2FA GOOGLE AUTHENTICATOR
// =====================================================
async function setup2FA() {

    try {

        const user = await account.get();

        if (user.mfa) {

            alert(
                currentLang === 'id'
                ? 'Keamanan 2FA sudah aktif di akun Anda.'
                : '2FA already enabled.'
            );

            return;
        }

        // CREATE TOTP
        const auth = await account.createMfaAuthenticator('totp');

        // SHOW MODAL
        const modal = document.getElementById('setup2faModal');

        modal.classList.remove('hidden');

        // RENDER QR
        setTimeout(() => {

            const qrContainer =
                document.getElementById('qr-container');

            qrContainer.innerHTML = '';

            new QRCode(qrContainer, {
                text: auth.uri,
                width: 200,
                height: 200,
                colorDark: "#1e1b4b",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

        }, 100);

    } catch (error) {

        console.error(error);

        alert(
            'Gagal inisialisasi 2FA: ' +
            error.message
        );
    }
}

// =====================================================
// CONFIRM 2FA
// =====================================================
async function confirmSetup2FA() {

    const code = document
        .getElementById('setup-2fa-code')
        .value
        .trim();

    if (code.length !== 6) {

        alert('Masukkan 6 digit kode.');

        return;
    }

    try {

        await account.verifyMfaAuthenticator(
            'totp',
            code
        );

        // ENABLE MFA ACCOUNT
        if (typeof account.updateMfa === 'function') {

            await account.updateMfa(true);

        } else if (typeof account.updateMFA === 'function') {

            await account.updateMFA(true);
        }

        alert('2FA Berhasil Diaktifkan!');

        close2FAModal();

        location.reload();

    } catch (error) {

        console.error(error);

        alert(
            'Kode tidak valid atau gagal aktivasi: '
            + error.message
        );
    }
}

// =====================================================
// CLOSE MODAL
// =====================================================
function close2FAModal() {

    document
        .getElementById('setup2faModal')
        .classList
        .add('hidden');

    document
        .getElementById('setup-2fa-code')
        .value = '';
}

// =====================================================
// LOGOUT
// =====================================================
async function handleLogout() {

    try {

        await account.deleteSession('current');

    } catch (error) {

        console.error(error);

    }

    location.reload();
}

// EXPORT
window.setup2FA = setup2FA;
window.confirmSetup2FA = confirmSetup2FA;
window.close2FAModal = close2FAModal;
window.handleLogout = handleLogout;

</script>

</body>
</html>
